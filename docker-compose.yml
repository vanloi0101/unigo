version: '3.9'

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: unigo-db
    environment:
      POSTGRES_USER: unigo_user
      POSTGRES_PASSWORD: unigo_password_123
      POSTGRES_DB: unigo_db
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./src/backend/prisma/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U unigo_user -d unigo_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - unigo_network

  # Node.js Backend
  backend:
    build:
      context: ./src/backend
      dockerfile: Dockerfile
    container_name: unigo-backend
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://unigo_user:unigo_password_123@db:5432/unigo_db
      CORS_ORIGIN: http://localhost:8080
      JWT_SECRET: your_jwt_secret_key_change_me_in_production
      JWT_EXPIRE: 7d
      CLOUDINARY_NAME: ${CLOUDINARY_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./src/backend/src:/app/src
      - ./src/backend/prisma:/app/prisma
    restart: unless-stopped
    networks:
      - unigo_network
    command: ["node", "src/index.js"]

  # React + Nginx Frontend
  frontend:
    build:
      context: ./src/fronend
      dockerfile: Dockerfile
    container_name: unigo-frontend
    environment:
      VITE_API_URL: http://localhost:3000/api
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - unigo_network

volumes:
  postgres_data:
    driver: local

networks:
  unigo_network:
    driver: bridge
